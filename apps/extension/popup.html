<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Benefits Guide</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <p class="eyebrow">Session-only guide</p>
      <h1>Benefits Guide</h1>
      <label>
        Spoken language
        <input id="language" value="Spanish" />
      </label>
      <label>
        Current task
        <input id="task" value="Apply for benefits" />
      </label>
      <button id="start">Explain this page</button>
      <button id="stop" class="secondary">Stop speaking</button>
      <p id="status">No data is stored by the extension unless Chrome saves your language preference.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
